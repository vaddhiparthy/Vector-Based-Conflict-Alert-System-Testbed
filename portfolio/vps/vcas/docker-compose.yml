services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: vcas
      POSTGRES_USER: vcas
      POSTGRES_PASSWORD: vcas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: vcas
      MINIO_ROOT_PASSWORD: vcasadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  vcas-api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    working_dir: /app
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - postgres
      - prometheus
    environment:
      VCAS_REDIS_URL: redis://redis:6379/0
      VCAS_POSTGRES_URL: postgresql+psycopg://vcas:vcas@postgres:5432/vcas
      VCAS_MINIO_ENDPOINT: minio:9000
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317

  dashboard:
    build:
      context: .
      dockerfile: docker/dashboard.Dockerfile
    working_dir: /app
    ports:
      - "8501:8501"
    depends_on:
      - vcas-api
    environment:
      VCAS_REDIS_URL: redis://redis:6379/0

  prometheus:
    image: prom/prometheus:v2.55.0
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro


volumes:
  postgres_data:
  redis_data:
  minio_data:
  grafana_data:
  prometheus_data:
