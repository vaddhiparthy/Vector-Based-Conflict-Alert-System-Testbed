dt_s: 1.0
duration_s: 600
name: azo_wide_traffic_late_conflict
description: >
  KAZO vicinity with wide-spread background traffic (not clustered) plus two
  test aircraft that start on unrelated tracks and only later converge into a
  short collision-risk window. The intent is: no alert rings early, alerting
  only when the physics-based conflict develops.

reference:
  aerodrome:
    lat: 42.2343889
    lon: -85.5515556
    alt_m: 100.0

aircraft:
  # Background traffic: spread out around ~15-25nm, different altitudes, and staggered spawn times.
  - callsign: BG01
    icao24: BG01
    waypoints:
      - { t_s: 0,   lat: 42.3900, lon: -85.8800, alt_m: 7200, gs_mps: 120, track_deg: 95,  vs_mps: 0 }
      - { t_s: 220, lat: 42.3600, lon: -85.5200, alt_m: 7200, gs_mps: 120, track_deg: 110, vs_mps: 0 }
      - { t_s: 420, lat: 42.4100, lon: -85.3000, alt_m: 7200, gs_mps: 120, track_deg: 70,  vs_mps: 0 }

  - callsign: BG02
    icao24: BG02
    waypoints:
      - { t_s: 40,  lat: 42.0700, lon: -85.3000, alt_m: 9200, gs_mps: 135, track_deg: 290, vs_mps: 0 }
      - { t_s: 260, lat: 42.1200, lon: -85.7200, alt_m: 9200, gs_mps: 135, track_deg: 250, vs_mps: 0 }
      - { t_s: 520, lat: 42.0300, lon: -85.9800, alt_m: 9200, gs_mps: 135, track_deg: 225, vs_mps: 0 }

  - callsign: BG03
    icao24: BG03
    waypoints:
      - { t_s: 80,  lat: 42.5200, lon: -85.4200, alt_m: 5200, gs_mps: 110, track_deg: 180, vs_mps: 0 }
      - { t_s: 260, lat: 42.3000, lon: -85.4200, alt_m: 5200, gs_mps: 110, track_deg: 180, vs_mps: 0 }
      - { t_s: 520, lat: 42.0800, lon: -85.4200, alt_m: 5200, gs_mps: 110, track_deg: 180, vs_mps: 0 }

  - callsign: BG04
    icao24: BG04
    waypoints:
      - { t_s: 120, lat: 42.2000, lon: -85.9800, alt_m: 6400, gs_mps: 125, track_deg: 90,  vs_mps: 0 }
      - { t_s: 300, lat: 42.2000, lon: -85.6000, alt_m: 6400, gs_mps: 125, track_deg: 90,  vs_mps: 0 }
      - { t_s: 520, lat: 42.2000, lon: -85.2400, alt_m: 6400, gs_mps: 125, track_deg: 90,  vs_mps: 0 }

  - callsign: BG05
    icao24: BG05
    waypoints:
      - { t_s: 160, lat: 42.0100, lon: -85.7600, alt_m: 3000, gs_mps: 95,  track_deg: 20,  vs_mps: 0 }
      - { t_s: 360, lat: 42.1700, lon: -85.7000, alt_m: 3000, gs_mps: 95,  track_deg: 40,  vs_mps: 0 }
      - { t_s: 560, lat: 42.3200, lon: -85.6200, alt_m: 3000, gs_mps: 95,  track_deg: 55,  vs_mps: 0 }

  - callsign: BG06
    icao24: BG06
    waypoints:
      - { t_s: 200, lat: 42.4700, lon: -85.7000, alt_m: 8600, gs_mps: 140, track_deg: 120, vs_mps: 0 }
      - { t_s: 420, lat: 42.2800, lon: -85.4200, alt_m: 8600, gs_mps: 140, track_deg: 135, vs_mps: 0 }
      - { t_s: 600, lat: 42.1400, lon: -85.2500, alt_m: 8600, gs_mps: 140, track_deg: 140, vs_mps: 0 }

  # Two test aircraft: start on unrelated headings and only align into conflict later.
  - callsign: TST1
    icao24: TST1
    waypoints:
      - { t_s: 0,   lat: 42.4200, lon: -85.8200, alt_m: 2600, gs_mps: 105, track_deg: 120, vs_mps: 0 }
      - { t_s: 140, lat: 42.3200, lon: -85.6500, alt_m: 2600, gs_mps: 105, track_deg: 100, vs_mps: 0 }
      - { t_s: 260, lat: 42.3000, lon: -85.4300, alt_m: 2600, gs_mps: 105, track_deg: 70,  vs_mps: 0 }
      # Curve back toward the field (still not aligned with TST2 yet).
      - { t_s: 360, lat: 42.2600, lon: -85.5000, alt_m: 2400, gs_mps: 95,  track_deg: 240, vs_mps: -0.6 }
      # Late inbound leg that becomes problematic.
      - { t_s: 460, lat: 42.2350, lon: -85.5700, alt_m: 2200, gs_mps: 90,  track_deg: 140, vs_mps: -0.2 }
      - { t_s: 540, lat: 42.2150, lon: -85.5550, alt_m: 2100, gs_mps: 85,  track_deg: 140, vs_mps: -0.1 }

  - callsign: TST2
    icao24: TST2
    waypoints:
      - { t_s: 60,  lat: 42.0000, lon: -85.1500, alt_m: 2400, gs_mps: 120, track_deg: 60,  vs_mps: 0 }
      - { t_s: 220, lat: 42.0800, lon: -85.0200, alt_m: 2400, gs_mps: 120, track_deg: 40,  vs_mps: 0 }
      - { t_s: 360, lat: 42.2200, lon: -85.0500, alt_m: 2400, gs_mps: 115, track_deg: 350, vs_mps: 0 }
      # Late inbound leg that becomes problematic near the field (converges with TST1 only late).
      - { t_s: 440, lat: 42.2500, lon: -85.3200, alt_m: 2300, gs_mps: 105, track_deg: 270, vs_mps: -0.2 }
      - { t_s: 520, lat: 42.2350, lon: -85.5400, alt_m: 2200, gs_mps: 95,  track_deg: 250, vs_mps: -0.1 }
