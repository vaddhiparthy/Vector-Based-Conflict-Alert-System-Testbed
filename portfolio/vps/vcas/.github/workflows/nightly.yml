name: vCAS Nightly Replay

on:
  schedule:
    - cron: "15 02 * * *"
  workflow_dispatch:

jobs:
  replay:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --dev

      - name: Run LFBO replay smoke + golden diff
        env:
          VCAS_REPLAY_AIRPORT: LFBO
          VCAS_REPLAY_DURATION_S: "3600"
          VCAS_SOURCE_MODE: replay
          VCAS_NIGHTLY_GOLDEN_PATH: golden/lfbo_1h_alerts.json
        run: |
          uv run python scripts/nightly_replay_check.py

