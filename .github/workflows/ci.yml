name: vCAS CI

on:
  pull_request:
    branches: ["**"]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --dev

      - name: Ruff lint
        run: uv run ruff check src tests scripts dashboard

      - name: SQLFluff parse
        run: uv run sqlfluff parse --dialect postgres

      - name: pytest
        run: uv run pytest -q

      - name: dbt parse
        run: |
          if [ -f dbt/dbt_project.yml ]; then
            pushd dbt
            uv run dbt parse
            popd
          else
            echo "No dbt project configured; skipping."
          fi

