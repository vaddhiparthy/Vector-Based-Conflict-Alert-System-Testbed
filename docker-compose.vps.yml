name: professional
services:
  vcas:
    image: professional-vcas:latest
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    pull_policy: never
    container_name: professional-vcas
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000/health >/dev/null 2>&1 || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
    mem_limit: 512m
    memswap_limit: 512m
    restart: unless-stopped
    env_file:
      - /opt/platform/vault/secrets/professional/vcas.env
    expose:
      - "8000"
    networks:
      - platform_edge
      - professional_net
networks:
  platform_edge:
    external: true
  professional_net:
    external: true
