services:
  vcas-demo:
    image: astrax-compute-cloud-professional-vcas:latest
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: astrax-compute-cloud-professional-vcas
    restart: unless-stopped
    env_file:
      - .env.vps
    expose:
      - '8000'
    networks:
      - astrax-compute-cloud_default

networks:
  astrax-compute-cloud_default:
    external: true
