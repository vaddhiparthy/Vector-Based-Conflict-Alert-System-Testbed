services:
  vcas-demo:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: astrax-compute-cloud-professional-vcas
    restart: unless-stopped
    env_file:
      - .env.vps
    expose:
      - '8000'
    networks:
      - finlens_default

networks:
  finlens_default:
    external: true
