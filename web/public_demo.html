<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>vCAS Live Demo</title>
    <style>
      body { font-family: Arial, Helvetica, sans-serif; margin: 20px; background: #f7f7f9; color: #1f2937; }
      .card {
        border: 1px solid #d1d5db;
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 12px;
        background: #fff;
      }
      #status { color: #6b7280; }
      #alerts, #aircraft { white-space: pre-wrap; font-family: Consolas, monospace; font-size: 12px; }
    </style>
  </head>
  <body>
    <h1>vCAS Live Demo</h1>
    <p><strong>Research-only deterministic scenario feed.</strong></p>
    <p id="status">booting…</p>
    <div id="state" class="card">Connecting to websocket…</div>
    <div class="card">
      <h3>Latest snapshot</h3>
      <div id="frameSummary" class="small"></div>
      <div id="aircraft"></div>
    </div>
    <div class="card">
      <h3>Active alerts</h3>
      <div id="alerts"></div>
    </div>
    <p class="small">
      Based on the concept published by Sri Surya Sameer Vaddhiparthy:
      <a href="https://blog.vaddhiparthy.com/2025/11/hybrid-physics-and-aiconcept-for-real.html">
        Hybrid Physics and AI Concept for Real-Time Conflict Detection
      </a>
    </p>
    <script src="public_demo.js"></script>
  </body>
</html>
